<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>RE Radar</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #090c17;
      --surface:  #0f1322;
      --card:     #131828;
      --card-h:   #171d30;
      --stroke:   rgba(255,255,255,.06);
      --stroke-h: rgba(255,255,255,.12);
      --a1:       #5b54f4;
      --a2:       #8b5cf6;
      --a3:       #06b6d4;
      --green:    #34d399;
      --yellow:   #fbbf24;
      --red:      #f87171;
      --text:     #f1f5f9;
      --sub:      #8b95a8;
      --dim:      #4a5568;
      --r-lg:     14px;
      --r-md:     10px;
      --r-sm:     7px;
    }

    html { border-radius: 18px; overflow: hidden; background: transparent; }

    body {
      width: 400px;
      min-height: 160px;
      max-height: 620px;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
      display: flex;
      flex-direction: column;
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,.07);
    }

    /* ── Top accent line ─────────────────────────────────── */
    .accent-bar {
      height: 3px;
      background: linear-gradient(90deg, var(--a1), var(--a2), var(--a3));
      flex-shrink: 0;
    }

    /* ── Header ──────────────────────────────────────────── */
    .hdr {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 18px 12px;
      background: var(--surface);
      border-bottom: 1px solid var(--stroke);
    }
    .hdr-logo {
      width: 34px; height: 34px; flex-shrink: 0;
      background: linear-gradient(135deg, var(--a1) 0%, var(--a2) 100%);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 17px;
      box-shadow: 0 4px 14px rgba(91,84,244,.35);
    }
    .hdr-info { flex: 1; }
    .hdr-title {
      font-size: 15px; font-weight: 700; letter-spacing: -.5px;
      background: linear-gradient(90deg, #fff 60%, #a5b4fc);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .hdr-desc { font-size: 10px; color: var(--dim); margin-top: 1px; }
    .hdr-badge {
      font-size: 10px; font-weight: 600;
      background: rgba(91,84,244,.15);
      color: #a5b4fc;
      border: 1px solid rgba(91,84,244,.3);
      padding: 3px 9px; border-radius: 99px;
      letter-spacing: .3px;
    }

    /* ── Form section ────────────────────────────────────── */
    .form { padding: 16px 18px 14px; display: flex; flex-direction: column; gap: 11px; }

    .field-lbl {
      font-size: 10px; font-weight: 600; letter-spacing: .8px;
      color: var(--dim); text-transform: uppercase; margin-bottom: 5px;
    }

    .sel-wrap { position: relative; }
    .sel-wrap .chevron {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      color: var(--dim); pointer-events: none;
      width: 14px; height: 14px;
    }

    select, input[type="number"] {
      width: 100%;
      background: var(--card);
      border: 1px solid var(--stroke);
      color: var(--text);
      padding: 9px 13px;
      border-radius: var(--r-md);
      font-size: 13px;
      outline: none;
      -webkit-appearance: none;
      appearance: none;
      transition: border-color .2s, box-shadow .2s;
    }
    select { padding-right: 32px; cursor: pointer; }
    select:focus, input:focus {
      border-color: rgba(91,84,244,.6);
      box-shadow: 0 0 0 3px rgba(91,84,244,.12);
    }

    .form-row { display: flex; gap: 10px; }
    .form-row .col { flex: 1; }

    /* ── Buttons ─────────────────────────────────────────── */
    .btn-row { display: flex; gap: 8px; }

    .btn-search {
      flex: 1;
      background: linear-gradient(135deg, var(--a1) 0%, var(--a2) 100%);
      color: #fff;
      border: none;
      border-radius: var(--r-md);
      padding: 11px 16px;
      font-size: 13px; font-weight: 600; letter-spacing: .1px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 7px;
      position: relative; overflow: hidden;
      box-shadow: 0 4px 16px rgba(91,84,244,.3);
      transition: box-shadow .2s, transform .12s, opacity .15s;
    }
    .btn-search::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,.12) 0%, transparent 100%);
    }
    .btn-search:hover  { box-shadow: 0 6px 22px rgba(91,84,244,.45); transform: translateY(-1px); }
    .btn-search:active { transform: translateY(0) scale(.98); box-shadow: none; }
    .btn-search:disabled { opacity: .4; cursor: not-allowed; transform: none; box-shadow: none; }

    .btn-stop {
      background: var(--card);
      border: 1px solid var(--stroke);
      color: var(--sub);
      border-radius: var(--r-md);
      padding: 11px 13px;
      font-size: 12px; font-weight: 500;
      cursor: pointer;
      display: none; align-items: center; gap: 5px;
      transition: border-color .2s, color .2s;
      white-space: nowrap;
    }
    .btn-stop.on    { display: flex; }
    .btn-stop:hover { border-color: rgba(248,113,113,.4); color: var(--red); }

    /* ── Progress ────────────────────────────────────────── */
    #prog {
      margin: 0 18px;
      background: var(--card);
      border: 1px solid var(--stroke);
      border-radius: var(--r-lg);
      padding: 11px 14px;
      display: none; flex-direction: column; gap: 8px;
    }
    #prog.on { display: flex; }

    .prog-header {
      display: flex; align-items: center; gap: 8px;
    }
    .prog-dot {
      width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
      background: linear-gradient(135deg, var(--a1), var(--a2));
      animation: glow 1.6s ease-in-out infinite;
    }
    @keyframes glow {
      0%,100% { box-shadow: 0 0 0 0 rgba(91,84,244,.6); }
      50%      { box-shadow: 0 0 0 4px rgba(91,84,244,0); }
    }
    .prog-msg { font-size: 11.5px; color: var(--sub); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .prog-pct { font-size: 11px; font-weight: 600; color: #a5b4fc; font-variant-numeric: tabular-nums; }

    .prog-track {
      height: 3px; background: rgba(255,255,255,.06);
      border-radius: 99px; overflow: hidden;
    }
    .prog-fill {
      height: 100%; width: 0%; border-radius: 99px;
      background: linear-gradient(90deg, var(--a1), var(--a2), var(--a3));
      background-size: 200% 100%;
      transition: width .45s cubic-bezier(.4,0,.2,1);
      animation: shimmer 2s linear infinite;
    }
    @keyframes shimmer {
      0%   { background-position: 100% 0; }
      100% { background-position: -100% 0; }
    }

    /* ── Listings ────────────────────────────────────────── */
    #results {
      flex: 1; overflow-y: auto; min-height: 0;
      padding: 10px 18px 14px;
      display: flex; flex-direction: column; gap: 8px;
    }
    #results::-webkit-scrollbar { width: 3px; }
    #results::-webkit-scrollbar-thumb { background: rgba(255,255,255,.07); border-radius: 99px; }

    #emptyMsg {
      text-align: center; padding: 28px 0 10px;
      color: var(--dim); font-size: 12px; line-height: 1.7;
    }
    #emptyMsg .ico { font-size: 28px; display: block; margin-bottom: 8px; opacity: .6; }

    /* ── Card ────────────────────────────────────────────── */
    .card {
      background: var(--card);
      border: 1px solid var(--stroke);
      border-left: 3px solid var(--clr, rgba(255,255,255,.1));
      border-radius: var(--r-lg);
      padding: 11px 13px 10px;
      cursor: pointer;
      transition: background .15s, border-color .15s, transform .12s, box-shadow .15s;
      animation: fadeUp .28s cubic-bezier(.4,0,.2,1);
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .card:hover {
      background: var(--card-h);
      border-color: var(--stroke-h);
      border-left-color: var(--clr, rgba(255,255,255,.2));
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(0,0,0,.4);
    }

    .c-top { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 5px; }
    .c-name {
      flex: 1; font-weight: 600; font-size: 12.5px; line-height: 1.4;
      overflow: hidden; display: -webkit-box;
      -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    }
    .c-score {
      flex-shrink: 0;
      font-size: 11px; font-weight: 700;
      padding: 3px 9px; border-radius: 7px;
      display: flex; align-items: center; gap: 3px; letter-spacing: -.2px;
    }
    .s-hi { background: rgba(52,211,153,.12); color: #34d399; }
    .s-md { background: rgba(251,191,36,.12);  color: #fbbf24; }
    .s-lo { background: rgba(248,113,113,.12); color: #f87171; }

    .c-pills {
      display: flex; gap: 5px; align-items: center; margin-bottom: 8px; flex-wrap: wrap;
    }
    .pill {
      font-size: 10px; font-weight: 500;
      padding: 2px 7px; border-radius: 5px;
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.07);
      color: var(--sub);
    }
    .pill-a { background: rgba(91,84,244,.1); border-color: rgba(91,84,244,.25); color: #a5b4fc; }
    .pill-g { background: rgba(52,211,153,.1); border-color: rgba(52,211,153,.25); color: #34d399; }

    .c-row {
      display: flex; flex-wrap: wrap; gap: 4px 14px;
      font-size: 12px; color: var(--sub);
    }
    .c-row strong { color: var(--text); font-weight: 600; }
    .yield { color: #34d399; font-weight: 700; }
    .net   { color: var(--sub); }

    /* ── Footer ──────────────────────────────────────────── */
    .foot {
      border-top: 1px solid var(--stroke);
      background: var(--surface);
      padding: 9px 18px;
      display: flex; align-items: center; justify-content: space-between;
    }
    #countLabel { font-size: 11px; color: var(--dim); font-variant-numeric: tabular-nums; }
    .foot-links { display: flex; gap: 14px; }
    .foot-links a {
      font-size: 11px; color: var(--dim); text-decoration: none;
      transition: color .15s;
    }
    .foot-links a:hover { color: var(--text); }
  </style>
</head>
<body>

  <!-- Top gradient bar -->
  <div class="accent-bar"></div>

  <!-- Header -->
  <div class="hdr">
    <div class="hdr-logo">🏠</div>
    <div class="hdr-info">
      <div class="hdr-title">RE Radar</div>
      <div class="hdr-desc">German real estate investment</div>
    </div>
    <div class="hdr-badge">Extension</div>
  </div>

  <!-- Search form -->
  <div class="form">
    <div>
      <div class="field-lbl">City</div>
      <div class="sel-wrap">
        <select id="selCity">
          <option value="Berlin">Berlin</option>
          <option value="Hamburg">Hamburg</option>
          <option value="München">München</option>
          <option value="Frankfurt">Frankfurt</option>
          <option value="Köln">Köln</option>
          <option value="Düsseldorf">Düsseldorf</option>
          <option value="Stuttgart">Stuttgart</option>
          <option value="Leipzig">Leipzig</option>
          <option value="Dresden">Dresden</option>
          <option value="Hannover">Hannover</option>
          <option value="Bremen">Bremen</option>
          <option value="Nürnberg">Nürnberg</option>
          <option value="Augsburg">Augsburg</option>
          <option value="Freiburg">Freiburg</option>
          <option value="Mannheim">Mannheim</option>
          <option value="Bonn">Bonn</option>
          <option value="Mainz">Mainz</option>
          <option value="Dortmund">Dortmund</option>
          <option value="Essen">Essen</option>
        </select>
        <!-- Chevron -->
        <svg class="chevron" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M5 7.5l5 5 5-5"/>
        </svg>
      </div>
    </div>

    <div class="form-row">
      <div class="col">
        <div class="field-lbl">Max listings</div>
        <input id="inpMax" type="number" value="5" min="1" max="20" style="text-align:center">
      </div>
      <div class="col">
        <div class="field-lbl">Budget (€)</div>
        <input id="inpBudget" type="number" placeholder="No limit" min="10000" step="10000">
      </div>
    </div>

    <div class="btn-row">
      <button class="btn-search" id="btnSearch">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        Search Online
      </button>
      <button class="btn-stop" id="btnStop">✕ Stop</button>
    </div>
  </div>

  <!-- Progress -->
  <div id="prog">
    <div class="prog-header">
      <div class="prog-dot" id="progDot"></div>
      <div class="prog-msg" id="progMsg">Initialising…</div>
      <div class="prog-pct" id="progPct"></div>
    </div>
    <div class="prog-track">
      <div class="prog-fill" id="progBar"></div>
    </div>
  </div>

  <!-- Listings -->
  <div id="results">
    <div id="emptyMsg">
      <span class="ico">🏠</span>
      Pick a city and click Search Online.<br>Listings stream in as they're found.
    </div>
  </div>

  <!-- Footer -->
  <div class="foot">
    <span id="countLabel">0 listings</span>
    <div class="foot-links">
      <a href="https://plutobi.github.io/RE-Rader/" target="_blank">Dashboard ↗</a>
      <a href="#" id="clearLink">Clear</a>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
